services:
  mysql:
    image: mysql:8.4
    container_name: flowboard-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: flowboard
      MYSQL_USER: flowboard
      MYSQL_PASSWORD: flowboard_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - flowboard_mysql_data:/var/lib/mysql

volumes:
  flowboard_mysql_data:
